<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Listing Website</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      animation: fadeIn 1s ease;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5rem;
      color: #f8fafc;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .header p {
      color: #cbd5e1;
      font-size: 1rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    .controls input,
    .controls select {
      padding: 12px 15px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 1rem;
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      transition: 0.3s ease;
    }

    .controls input::placeholder {
      color: #cbd5e1;
    }

    .controls input:focus,
    .controls select:focus {
      transform: scale(1.03);
      border-color: #38bdf8;
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.35);
    }

    .controls select option {
      color: black;
    }

    .product-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      align-items: center;
    }

    .product-image {
      width: 100%;
      height: 420px;
      border-radius: 25px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 15px 40px rgba(0,0,0,0.35);
      animation: slideInLeft 0.8s ease;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .product-image:hover img {
      transform: scale(1.08);
    }

    .product-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      animation: slideInRight 0.8s ease;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(45deg, #38bdf8, #0ea5e9);
      color: white;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.9rem;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .product-card h2 {
      font-size: 2rem;
      margin-bottom: 15px;
      color: #f8fafc;
    }

    .product-card p {
      font-size: 1.05rem;
      color: #e2e8f0;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .price {
      font-size: 2rem;
      font-weight: bold;
      color: #22c55e;
      margin: 20px 0;
    }

    .buttons {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .buttons button {
      flex: 1;
      min-width: 150px;
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .prev-btn {
      background: linear-gradient(45deg, #f59e0b, #f97316);
      color: white;
    }

    .next-btn {
      background: linear-gradient(45deg, #3b82f6, #06b6d4);
      color: white;
    }

    .buy-btn {
      background: linear-gradient(45deg, #22c55e, #16a34a);
      color: white;
    }

    .buttons button:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .stat-box {
      flex: 1;
      min-width: 120px;
      background: rgba(255,255,255,0.07);
      padding: 18px;
      border-radius: 18px;
      text-align: center;
      transition: 0.3s ease;
    }

    .stat-box:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.12);
    }

    .stat-box h3 {
      font-size: 1.3rem;
      color: #38bdf8;
      margin-bottom: 8px;
    }

    .stat-box p {
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    .footer-note {
      margin-top: 30px;
      text-align: center;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 900px) {
      .product-section {
        grid-template-columns: 1fr;
      }

      .product-image {
        height: 320px;
      }

      .product-card h2 {
        font-size: 1.7rem;
      }

      .header h1 {
        font-size: 2rem;
      }
    }

    @media (max-width: 500px) {
      .container {
        padding: 20px;
      }

      .buttons {
        flex-direction: column;
      }

      .buttons button {
        width: 100%;
      }

      .stats {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>🛍 Product Listing Website</h1>
      <p>Professional Product Showcase with Filters, Navigation & Animations</p>
    </div>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search product..." />
      <select id="categoryFilter">
        <option value="All">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Fashion">Fashion</option>
        <option value="Home">Home</option>
        <option value="Sports">Sports</option>
      </select>
    </div>

    <div class="product-section">
      <div class="product-image">
        <img id="productImage" src="" alt="Product Image">
      </div>

      <div class="product-card">
        <span class="badge" id="productCategory">Category</span>
        <h2 id="productTitle">Product Title</h2>
        <p><strong>Owner:</strong> <span id="productOwner">Owner Name</span></p>
        <p><strong>Description:</strong> <span id="productDescription">Product Description</span></p>
        <div class="price" id="productPrice">$0</div>

        <div class="buttons">
          <button class="prev-btn" onclick="previousProduct()">⟵ Previous</button>
          <button class="next-btn" onclick="nextProduct()">Next ⟶</button>
          <button class="buy-btn">Buy Now</button>
        </div>

        <div class="stats">
          <div class="stat-box">
            <h3 id="productRating">4.8⭐</h3>
            <p>Rating</p>
          </div>
          <div class="stat-box">
            <h3 id="productStock">In Stock</h3>
            <p>Availability</p>
          </div>
          <div class="stat-box">
            <h3 id="productID">#001</h3>
            <p>Product ID</p>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note">
      Built with HTML, CSS & JavaScript ✨
    </div>
  </div>

  <script>
    const products = [
      {
        title: "Wireless Headphones",
        owner: "Sony Tech",
        price: "$120",
        category: "Electronics",
        description: "Premium quality wireless headphones with noise cancellation and immersive sound.",
        image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e",
        rating: "4.8⭐",
        stock: "In Stock",
        id: "#001"
      },
      {
        title: "Smart Watch",
        owner: "Apple Wearables",
        price: "$250",
        category: "Electronics",
        description: "Elegant smartwatch with health tracking, notifications, and stylish design.",
        image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30",
        rating: "4.7⭐",
        stock: "In Stock",
        id: "#002"
      },
      {
        title: "Stylish Jacket",
        owner: "Zara Fashion",
        price: "$80",
        category: "Fashion",
        description: "Trendy and comfortable jacket designed for a premium modern look.",
        image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab",
        rating: "4.6⭐",
        stock: "Limited",
        id: "#003"
      },
      {
        title: "Luxury Sofa",
        owner: "IKEA Home",
        price: "$540",
        category: "Home",
        description: "Modern luxury sofa with soft fabric and elegant minimalist design.",
        image: "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85",
        rating: "4.9⭐",
        stock: "In Stock",
        id: "#004"
      },
      {
        title: "Football",
        owner: "Nike Sports",
        price: "$35",
        category: "Sports",
        description: "High-quality football made for training, matches, and outdoor fun.",
        image: "https://images.unsplash.com/photo-1517649763962-0c623066013b",
        rating: "4.5⭐",
        stock: "In Stock",
        id: "#005"
      },
      {
        title: "Running Shoes",
        owner: "Nike",
        price: "$95",
        category: "Sports",
        description: "Lightweight running shoes built for comfort, speed, and performance.",
        image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff",
        rating: "4.8⭐",
        stock: "In Stock",
        id: "#006"
      }
    ];

    let filteredProducts = [...products];
    let currentIndex = 0;

    const productImage = document.getElementById("productImage");
    const productTitle = document.getElementById("productTitle");
    const productOwner = document.getElementById("productOwner");
    const productPrice = document.getElementById("productPrice");
    const productCategory = document.getElementById("productCategory");
    const productDescription = document.getElementById("productDescription");
    const productRating = document.getElementById("productRating");
    const productStock = document.getElementById("productStock");
    const productID = document.getElementById("productID");

    function displayProduct(index) {
      const product = filteredProducts[index];

      if (!product) return;

      productImage.style.opacity = 0;
      document.querySelector(".product-card").style.opacity = 0;

      setTimeout(() => {
        productImage.src = product.image;
        productTitle.textContent = product.title;
        productOwner.textContent = product.owner;
        productPrice.textContent = product.price;
        productCategory.textContent = product.category;
        productDescription.textContent = product.description;
        productRating.textContent = product.rating;
        productStock.textContent = product.stock;
        productID.textContent = product.id;

        productImage.style.opacity = 1;
        document.querySelector(".product-card").style.opacity = 1;
      }, 250);
    }

    function nextProduct() {
      currentIndex = (currentIndex + 1) % filteredProducts.length;
      displayProduct(currentIndex);
    }

    function previousProduct() {
      currentIndex = (currentIndex - 1 + filteredProducts.length) % filteredProducts.length;
      displayProduct(currentIndex);
    }

    function filterProducts() {
      const searchValue = document.getElementById("searchInput").value.toLowerCase();
      const categoryValue = document.getElementById("categoryFilter").value;

      filteredProducts = products.filter(product => {
        const matchesSearch =
          product.title.toLowerCase().includes(searchValue) ||
          product.owner.toLowerCase().includes(searchValue);

        const matchesCategory =
          categoryValue === "All" || product.category === categoryValue;

        return matchesSearch && matchesCategory;
      });

      currentIndex = 0;

      if (filteredProducts.length > 0) {
        displayProduct(currentIndex);
      } else {
        productImage.src = "";
        productTitle.textContent = "No Product Found";
        productOwner.textContent = "-";
        productPrice.textContent = "$0";
        productCategory.textContent = "N/A";
        productDescription.textContent = "Try another search or filter.";
        productRating.textContent = "-";
        productStock.textContent = "-";
        productID.textContent = "-";
      }
    }

    document.getElementById("searchInput").addEventListener("input", filterProducts);
    document.getElementById("categoryFilter").addEventListener("change", filterProducts);

    displayProduct(currentIndex);
  </script>

</body>
</html>
